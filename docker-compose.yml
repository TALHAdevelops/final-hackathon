services:
  db:
    image: postgres:16
    container_name: maintainiq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: maintainiq
      POSTGRES_PASSWORD: maintainiq
      POSTGRES_DB: maintainiq
    ports:
      - "5432:5432"
    volumes:
      - maintainiq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintainiq -d maintainiq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  maintainiq_pgdata:
